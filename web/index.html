<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nocturne - Piano Arranger</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="app-title">Nocturne</h1>
                <p class="app-version">v0.1.0</p>
            </div>

            <section class="sidebar-section">
                <h2>File</h2>
                <button id="selectAudioBtn" class="btn btn-primary">Select Audio</button>
                <div class="file-path-container">
                    <p class="file-path-label">Selected:</p>
                    <p id="selectedFilePath" class="file-path">None</p>
                </div>
            </section>

            <section class="sidebar-section">
                <h2>Settings</h2>
                
                <div class="control-group">
                    <label for="difficultySelect">Difficulty</label>
                    <select id="difficultySelect" class="select-control">
                        <option value="easy">Easy</option>
                        <option value="normal" selected>Normal</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="styleSelect">Style</label>
                    <select id="styleSelect" class="select-control">
                        <option value="pop" selected>Pop</option>
                        <option value="jazz">Jazz</option>
                        <option value="classical">Classical</option>
                    </select>
                </div>
            </section>

            <section class="sidebar-section">
                <h2>Stats</h2>
                <div class="stats-grid">
                    <div class="stat-badge">
                        <span class="stat-label">Key</span>
                        <span id="statKey" class="stat-value">—</span>
                    </div>
                    <div class="stat-badge">
                        <span class="stat-label">BPM</span>
                        <span id="statBPM" class="stat-value">—</span>
                    </div>
                    <div class="stat-badge">
                        <span class="stat-label">Notes</span>
                        <span id="statNotes" class="stat-value">—</span>
                    </div>
                    <div class="stat-badge">
                        <span class="stat-label">Status</span>
                        <span id="statStatus" class="stat-value">Ready</span>
                    </div>
                </div>
            </section>

            <section class="sidebar-section">
                <button id="startProcessBtn" class="btn btn-success" disabled>Start Processing</button>
                <button id="exportMidiBtn" class="btn btn-secondary" disabled>Export MIDI</button>
            </section>
        </aside>

        <main class="main-content">
            <div class="canvas-container">
                <canvas id="pianoRollCanvas"></canvas>
                <div class="canvas-overlay">
                    <p id="canvasMessage">Load an audio file to begin</p>
                </div>
                
                <div class="progress-overlay" id="progressOverlay">
                    <div class="progress-bar-wrapper">
                        <div id="progressBar" class="progress-bar-fill"></div>
                    </div>
                    <div class="progress-info">
                        <span id="progressMessage">Ready</span>
                    </div>
                </div>
            </div>

            <div class="playback-control-bar" id="playbackControlBar">
                <div class="control-drag-handle" id="controlDragHandle">
                    <span class="drag-dots">⋮⋮</span>
                </div>
                
                <div class="control-buttons-group">
                    <button id="playBtn" class="play-control-btn" title="Play" disabled>
                        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
                    </button>
                    <button id="pauseBtn" class="play-control-btn hidden" title="Pause">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="currentColor"/></svg>
                    </button>
                    <button id="stopBtn" class="play-control-btn" title="Stop" disabled>
                        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M6 6h12v12H6z" fill="currentColor"/></svg>
                    </button>
                </div>

                <div class="time-display-container">
                    <span id="currentTimeDisplay">00:00</span>
                    <span class="time-separator">/</span>
                    <span id="totalTimeDisplay">00:00</span>
                </div>

                <div class="slider-control-group">
                    <span class="slider-label">Speed</span>
                    <input type="range" id="tempoSlider" min="0.5" max="2.0" step="0.1" value="1.0" class="playback-range-slider">
                    <span id="tempoValueLabel" class="slider-value-indicator">1.0x</span>
                </div>

                <div id="pedalIndicator" class="pedal-status-badge" title="Sustain Pedal Status">
                    PEDAL
                </div>
            </div>

            <div class="log-panel">
                <div class="log-header">
                    <span>Processing Log</span>
                    <button id="clearLogBtn" class="btn-small">Clear</button>
                </div>
                <div id="logDisplay" class="log-display"></div>
            </div>
        </main>
    </div>

    <script src="/js/piano-roll.js"></script>
    <script src="/js/playback.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
