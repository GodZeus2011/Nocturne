<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: #1a1a1a; color: white; font-family: sans-serif; padding: 50px;">
    <h1>Nocturne</h1>
    <p id="app-info">Connecting to backend...</p>
    
    <button onclick="selectAndProcess()" style="padding: 10px 20px; cursor: pointer;">
        Select Audio & Process
    </button>
    
    <p style="font-size: 0.8em; color: #888;">File: <span id="selected-path">None</span></p>

    <div id="progress-container" style="width: 100%; background: #333; height: 20px; margin-top: 20px;">
        <div id="progress-fill" style="width: 0%; background: #4CAF50; height: 100%; transition: width 0.3s;"></div>
    </div>
    <p id="status-text">Idle</p>

    <script src="js/main.js"></script>
    <script>
        window.addEventListener('pywebviewready', async () => {
            const info = await window.pywebview.api.get_app_info();
            document.getElementById('app-info').innerText = `${info.name} v${info.version} - ${info.status}`;
        });
    </script>
</body>
</html>
